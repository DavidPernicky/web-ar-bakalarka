<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <title>AR Vizitka - Katedra Informatiky</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      #scan-button {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 1000; padding: 15px 25px; background-color: #00FF00;
        color: black; border: none; border-radius: 30px; font-weight: bold;
        text-transform: uppercase; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); cursor: pointer;
      }
      #qr-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column;
        align-items: center; justify-content: center;
      }
      #qr-reader { width: 80%; max-width: 300px; border: 2px solid #00FF00; }
      .close-btn { margin-top: 20px; padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; }
      #web-button {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 1000; padding: 15px 25px; background-color: #008CBA; color: white;
        text-decoration: none; border-radius: 30px; font-weight: bold;
        text-transform: uppercase; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); display: none; white-space: nowrap;
      }
      .mindar-ui-overlay, .mindar-ui-loading { pointer-events: none; }
      .a-canvas { pointer-events: auto !important; }
    </style>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const currentID = urlParams.get('id');
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSQ-SFdCTOWEviIYJZSk0mwkyh6li8dnKCQB_LnLvrwEZklXjggD67hqnsx0kBIxoEUZoiqDNp_gfWF/pub?output=csv";

      AFRAME.registerComponent('vcard-logic', {
        init: function () {
          if (!currentID) return;
          fetch(csvUrl)
            .then(response => response.arrayBuffer()) 
            .then(buffer => {
              const decoder = new TextDecoder('utf-8');
              const csvText = decoder.decode(buffer);
              const rows = csvText.split('\n');
              for (let i = 1; i < rows.length; i++) {
                const columns = rows[i].split(',');
                if (columns[0] && columns[0].trim() === currentID) {
                  const titulPred = columns[1].trim();
                  const meno = columns[2].trim();
                  const priezvisko = columns[3].trim();
                  const titulZa = columns[4].trim();
                  const telNum = columns[5].trim();
                  const mailAddr = columns[6].trim();
                  
                  const plneMeno = `${titulPred} ${meno}`.trim();
                  const plnePriezvisko = `${priezvisko} ${titulZa}`.trim();
                  
                  document.querySelector('#ar-meno').setAttribute('value', plneMeno);
                  document.querySelector('#ar-priezvisko').setAttribute('value', plnePriezvisko);
                  
                  // Uložíme linky do 3D objektov
                  document.getElementById('kruh-volat').setAttribute('data-url', `tel:${telNum}`);
                  document.getElementById('kruh-sms').setAttribute('data-url', `sms:${telNum}`);
                  document.getElementById('kruh-email').setAttribute('data-url', `mailto:${mailAddr}`);
                  break;
                }
              }
            });
        }
      });

      AFRAME.registerComponent('logo-interact', {
        init: function () {
          this.el.addEventListener('click', () => {
            const infoPanel = document.querySelector('#info-panel');
            const profilSekcia = document.querySelector('#profil-sekcia');
            const akcieSekcia = document.querySelector('#akcie-sekcia');
            const btnScan = document.getElementById('scan-button');
            const btnWeb = document.getElementById('web-button');
            
            // Zisťujeme, či je panel momentálne otvorený (mierka > 0)
            const currentScale = infoPanel.getAttribute('scale');
            
            if (infoPanel.getAttribute('visible') && currentScale.x > 0) {
              // ZATVÁRANIE
              infoPanel.emit('closePanel');
              // Počkáme, kým skončí animácia zmenšenia, potom skryjeme úplne
              setTimeout(() => {
                infoPanel.setAttribute('visible', false);
                profilSekcia.setAttribute('visible', true);
                akcieSekcia.setAttribute('visible', true);
                btnScan.style.display = 'block';
                btnWeb.style.display = 'none';
              }, 300);
            } else {
              // OTVÁRANIE
              profilSekcia.setAttribute('visible', false);
              akcieSekcia.setAttribute('visible', false);
              btnScan.style.display = 'none';
              btnWeb.style.display = 'block';
              
              infoPanel.setAttribute('visible', true);
              infoPanel.emit('openPanel');
            }
          });
        }
      });

      AFRAME.registerComponent('akcia-tlacidla', {
        init: function () {
          this.el.addEventListener('click', () => {
            const url = this.el.getAttribute('data-url');
            if (url) { window.location.href = url; }
          });
        }
      });

      AFRAME.registerComponent('slideshow', {
        schema: { fotky: {type: 'array', default: []}, interval: {type: 'number', default: 3000} },
        init: function () {
          this.index = 0;
          this.el.setAttribute('src', this.data.fotky[this.index]);
          this.timer = setInterval(() => {
            this.index = (this.index + 1) % this.data.fotky.length;
            this.el.setAttribute('src', this.data.fotky[this.index]);
          }, this.data.interval);
        },
        remove: function () { clearInterval(this.timer); }
      });

      let html5QrCode;
      function openScanner() {
        document.getElementById('qr-overlay').style.display = 'flex';
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
          window.location.href = decodedText;
        });
      }
      function closeScanner() {
        if (html5QrCode) { html5QrCode.stop().then(() => { document.getElementById('qr-overlay').style.display = 'none'; }); }
      }
    </script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">

    <button id="scan-button" onclick="openScanner()">Skenovať ďalšiu vizitku</button>
    <a id="web-button" href="https://kti.aos.sk/index.php" target="_blank">Webstránka katedry</a>

    <div id="qr-overlay">
      <h3 style="color:white; font-family: sans-serif;">Naskenujte QR kod</h3>
      <div id="qr-reader"></div>
      <button class="close-btn" onclick="closeScanner()">Zavrieť</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" vcard-logic>
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable; far: 10000;"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
          <a-entity id="profil-sekcia" position="0 -0.5 0">
             <a-circle src="./fotkyKatedra/david.png" radius="0.15" position="-0.25 0 0.1"></a-circle>
             <a-entity position="-0.1 0 0.1">
                <a-text id="ar-meno" value="Meno" color="#FFFFFF" align="left" position="0 0.08 0" width="2" font="./Exo2-Medium-msdf.json" negate="false"></a-text>
                <a-text id="ar-priezvisko" value="Priezvisko" color="#FFFFFF" align="left" position="0 -0.07 0" width="2" font="./Exo2-Medium-msdf.json" negate="false"></a-text>
             </a-entity>
          </a-entity>

          <a-entity position=" 0.8 -0.1 0.2" animation__float="property: position; from: 0.8 -0.1 0.2; to: 0.8 0.25 0.2; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine">
              <a-gltf-model src="./logokti.glb" scale="1 1 1" class="clickable" logo-interact></a-gltf-model>
          </a-entity>

          <a-entity id="akcie-sekcia" position="0 -0.9 0">
             
             <a-circle id="kruh-volat" position="-0.36 0 0.05" radius="0.1" color="#FFFFFF" opacity="0.9" class="clickable" akcia-tlacidla data-url="">
               <a-image src="./tlacidla/telephone.png" width="0.12" height="0.12" position="0 0 0.01" material="alphaTest: 0.5; transparent: true; shader: flat"></a-image>
             </a-circle>

             <a-circle id="kruh-sms" position="-0.12 0 0.05" radius="0.1" color="#FFFFFF" opacity="0.9" class="clickable" akcia-tlacidla data-url="">
               <a-image src="./tlacidla/sms.png" width="0.12" height="0.12" position="0 0 0.01" material="alphaTest: 0.5; transparent: true; shader: flat"></a-image>
             </a-circle>

             <a-circle id="kruh-email" position="0.12 0 0.05" radius="0.1" color="#FFFFFF" opacity="0.9" class="clickable" akcia-tlacidla data-url="">
               <a-image src="./tlacidla/mail.png" width="0.12" height="0.12" position="0 0 0.01" material="alphaTest: 0.5; transparent: true; shader: flat"></a-image>
             </a-circle>

             <a-circle id="kruh-mapa" position="0.36 0 0.05" radius="0.1" color="#FFFFFF" opacity="0.9" class="clickable" akcia-tlacidla data-url="https://maps.google.com/?q=Akadémia+ozbrojených+síl+Liptovský+Mikuláš">
               <a-image src="./tlacidla/maps-and-flags.png" width="0.12" height="0.12" position="0 0 0.01" material="alphaTest: 0.5; transparent: true; shader: flat"></a-image>
             </a-circle>

          </a-entity>

          <a-entity id="info-panel" visible="false" position="0 -0.1 0.05" scale="0 0 0"
                    animation__open="property: scale; to: 0.55 0.55 0.55; dur: 500; startEvents: openPanel; easing: easeOutElastic"
                    animation__close="property: scale; to: 0 0 0; dur: 300; startEvents: closePanel; easing: easeInBack">

            <a-plane width="2.4" height="2.4" color="#000000" opacity="0.95" material="border: 2px solid #00FF00;"></a-plane>
            <a-text value="KATEDRA INFORMATIKY" color="#FFFFFF" align="center" position="0 0.65 0.05" width="3" font="./Exo2-Medium-msdf.json" negate="false"></a-text>
            <a-text value="Katedra informatiky AOS zabezpečuje komplexné vzdelávanie a vedecký výskum v oblasti IKT a matematiky so špeciálnym zameraním na potreby Ozbrojených síl SR." color="#FFFFFF" align="left"  width="1.6" wrap-count="28" font="./Exo2-Medium-msdf.json" negate="false" position="0 0.15 0.05"></a-text>
            <a-image position="0 -0.4 0.05" width="1.2" height="0.6" slideshow="fotky: ./fotkyKatedra/KtI_1.jpg, ./fotkyKatedra/KtI_2.jpg, ./fotkyKatedra/KtI_3.jpg, ./fotkyKatedra/KtI_4.jpg, ./fotkyKatedra/KtI_5.jpg, ./fotkyKatedra/KtI_6.jpg; interval: 3000"></a-image>
          </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
