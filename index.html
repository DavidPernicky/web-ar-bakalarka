<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Vizitka - Dávid Pernický (3D)</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // 2. JAVASCRIPT: Logika pre klikateľné tlačidlá (AR interakcia)
      AFRAME.registerComponent('click-handler', {
        init: function () {
          this.el.addEventListener('click', () => {
            const link = this.el.getAttribute("data-link");
            if (link) {
              // Otvorí odkaz v novom okne
              window.open(link, '_blank'); 
            }
          });
        }
      });
    </script>
  </head>
  <body>
    
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="icon-web" src="assets/globe-solid-full.svg" />
        <img id="icon-email" src="assets/envelope-solid-full.svg" />
        
        <a-asset-item id="avatar-model" src="assets/693ec253b6235d0cd191a3bf.glb"></a-asset-item> 
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-entity position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03;" material="color: white; shader: flat" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 999; objects: .clickable"></a-entity>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-gltf-model 
          src="#avatar-model" 
          position="0 0.5 0"    
          scale="0.3 0.3 0.3"    
          rotation="0 180 0">  </a-gltf-model>
        
        <a-text 
          value="Dávid Pernický" 
          color="white" 
          position="0 0.05 0" 
          width="1.8" 
          align="center">
        </a-text>
        
        <a-text 
          value="Študent, Katedra informatiky" 
          color="#AAA" 
          position="0 -0.05 0" 
          width="1.2" 
          align="center">
        </a-text>

        <a-image 
          src="#icon-web" 
          position="-0.1 -0.3 0" 
          width="0.15" 
          height="0.15" 
          class="clickable" 
          click-handler 
          data-link="https://www.tvoja-portfolio-stranka.sk">
        </a-image>
        
        <a-image 
          src="#icon-email" 
          position="0.1 -0.3 0" 
          width="0.15" 
          height="0.15" 
          class="clickable" 
          click-handler 
          data-link="mailto:hello@reallygreatsite.com">
        </a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
